name: Secret Scan

# 在 push 與 PR 時掃描，擋住誤 commit 的 Drive Folder ID、Calendar ID、Gmail 等敏感字串。
# 注意：這層只是輔助，主要靠 .gitignore 與 config.example.gs 設計避免敏感資訊進 repo。

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for suspicious patterns
        run: |
          set -e
          echo "Scanning for potentially leaked IDs..."

          # Drive Folder ID（28+ 個字元）出現在非 .example 檔案中
          if git grep -nE '[A-Za-z0-9_-]{28,}' -- ':!*.example.*' ':!docs/**' ':!*.md' ':!LICENSE'; then
            echo "::warning::Found potentially leaked long IDs. Please verify they're not real Drive/Calendar IDs."
          fi

          # Calendar ID（含 @group.calendar.google.com）
          if git grep -nE '[a-z0-9]+@group\.calendar\.google\.com' -- ':!*.example.*' ':!docs/**'; then
            echo "::error::Found a real-looking Calendar ID. Please move it to config.gs (gitignored)."
            exit 1
          fi

          # 學校帳號樣式 Email（以 @school、@edu 結尾）
          if git grep -nEi '[a-zA-Z0-9._-]+@[a-zA-Z0-9.-]*\.(edu|edu\.tw|sch\.ad)' -- ':!*.example.*' ':!docs/**'; then
            echo "::error::Found a real-looking school email. Please replace with placeholder."
            exit 1
          fi

          echo "Secret scan completed."
